site_name: Bias & Fairness Playbooks
site_url: https://tatsianamark.github.io/bias-and-fairness-playbooks

theme:
  name: material
  icon:
    logo: material/scale-balance

  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.sections     # Section grouping in sidebar
    - content.code.copy       # Add copy buttons to code blocks
    - content.action.edit     # Show edit link if using a repo


markdown_extensions:
  - attr_list   # Enables {#id .class} style attributes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


copyright: >
  © 2026 Tatsiana Donkhina &nbsp;·&nbsp;
  Code <a href="LICENSE">MIT</a> &nbsp;·&nbsp;
  Docs <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: /CONTRIBUTING/
      name: Contributing
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/tatsianamark/
      name: LinkedIn

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  google*.html

nav:
  - Home: index.md

  - Assessment:
    - Fairness Assessment Playbook:
      - Overview and Guidance: playbooks/fairness_assessment_playbook/fairness_assessment_playbook_intro.md 
      - Context & History Analysis: playbooks/fairness_assessment_playbook/context_and_history_analysis.md
      - Fairness Definition Guide: playbooks/fairness_assessment_playbook/fairness_definition_guide.md
      - Bias Root Cause Analysis: playbooks/fairness_assessment_playbook/bias_root_cause_analysis.md
      - Fairness Metrics: playbooks/fairness_assessment_playbook/fairness_metrics.md
    - Case Study:
      - Medical Health AI Agent: case_studies/medical_health_ai_agent.md
  - Action :
    - Fairness Action Playbook:
        - Overview and Guidance: playbooks/fairness_action_playbook/fairness_action_playbook_intro.md
        - Causal Analysis: playbooks/fairness_action_playbook/causal_fairness_analysis.md
        - Pre-Processing (Data): playbooks/fairness_action_playbook/pre_processing.md
        - In-Processing (Model): playbooks/fairness_action_playbook/in_processing.md
        - Post-Processing (Outcomes): playbooks/fairness_action_playbook/post_processing.md
        - Validation Framework: playbooks/fairness_action_playbook/validation_framework.md
        - Implementation Guide: playbooks/fairness_action_playbook/org_guide.md
    - Case Study:
      - Loan Approval Project: case_studies/loan_approval_fairness_e2e_case.md

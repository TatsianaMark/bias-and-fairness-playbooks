<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f6b7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c8cdd2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Header -->
  <rect x="165" y="16" width="350" height="34" rx="8" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#0c447c">Fairness Assessment Playbook</text>

  <!-- Trunk + bus -->
  <line x1="340" y1="50" x2="340" y2="68" stroke="#9aa5ae" stroke-width="1"/>
  <line x1="66" y1="68" x2="614" y2="68" stroke="#9aa5ae" stroke-width="1"/>
  <line x1="66"  y1="68" x2="66"  y2="96" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="228" y1="68" x2="228" y2="96" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="452" y1="68" x2="452" y2="96" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="614" y1="68" x2="614" y2="96" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step boxes -->
  <rect x="20" y="96" width="138" height="52" rx="8" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/>
  <text x="89" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0c447c">Context &amp; History</text>
  <text x="89" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">Analysis</text>

  <line x1="158" y1="122" x2="184" y2="122" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="186" y="96" width="138" height="52" rx="8" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/>
  <text x="255" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0c447c">Fairness Definition</text>
  <text x="255" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">Guide</text>

  <line x1="324" y1="122" x2="356" y2="122" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="358" y="96" width="138" height="52" rx="8" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/>
  <text x="427" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0c447c">Bias Root Cause</text>
  <text x="427" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">Analysis</text>

  <line x1="496" y1="122" x2="522" y2="122" stroke="#9aa5ae" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="524" y="96" width="138" height="52" rx="8" fill="#b5d4f4" stroke="#378add" stroke-width="0.5"/>
  <text x="593" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0c447c">Fairness</text>
  <text x="593" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">Metrics</text>

  <!-- Description boxes -->
  <rect x="20" y="168" width="138" height="72" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="89" y="188" text-anchor="middle" font-size="11" fill="#444441">Foundational</text>
  <text x="89" y="204" text-anchor="middle" font-size="11" fill="#444441">understanding of</text>
  <text x="89" y="220" text-anchor="middle" font-size="11" fill="#444441">potential biases</text>

  <line x1="158" y1="204" x2="184" y2="204" stroke="#c8cdd2" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow-soft)"/>

  <rect x="186" y="168" width="138" height="72" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="255" y="188" text-anchor="middle" font-size="11" fill="#444441">Definitions shaped</text>
  <text x="255" y="204" text-anchor="middle" font-size="11" fill="#444441">by context and</text>
  <text x="255" y="220" text-anchor="middle" font-size="11" fill="#444441">stakeholder priorities</text>

  <line x1="324" y1="204" x2="356" y2="204" stroke="#c8cdd2" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow-soft)"/>

  <rect x="358" y="168" width="138" height="72" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="427" y="188" text-anchor="middle" font-size="11" fill="#444441">Bias sources ranked</text>
  <text x="427" y="204" text-anchor="middle" font-size="11" fill="#444441">by selected</text>
  <text x="427" y="220" text-anchor="middle" font-size="11" fill="#444441">definitions</text>

  <line x1="496" y1="204" x2="522" y2="204" stroke="#c8cdd2" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow-soft)"/>

  <rect x="524" y="168" width="138" height="72" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="593" y="188" text-anchor="middle" font-size="11" fill="#444441">Outcomes measured</text>
  <text x="593" y="204" text-anchor="middle" font-size="11" fill="#444441">to validate and</text>
  <text x="593" y="220" text-anchor="middle" font-size="11" fill="#444441">guide mitigation</text>

  <!-- Warning note -->
  <rect x="20" y="262" width="640" height="58" rx="8" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
  <text x="340" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">Work through each step in order. Gaps early on,</text>
  <text x="340" y="302" text-anchor="middle" font-size="11" fill="#854f0b">especially in historical context, will skew your metrics later.</text>
</svg>
